openapi: 3.0.1
info:
  title: GOMP
  version: "1.0"
servers:
  - url: /api/v1
paths:
  /app/info:
    get:
      tags: [ app ]
      summary: Get application info
      description: get application info
      operationId: getInfo
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/appInfo"
  /app/configuration:
    get:
      tags: [ app ]
      summary: Get application configuration
      description: get application configuration
      operationId: getConfiguration
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/appConfiguration"
    put:
      tags: [ app ]
      summary: Save application configuration
      description: modify application configuration
      operationId: saveConfiguration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/appConfiguration"
        required: true
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ admin ]
      x-codegen-request-body-name: appConfiguration
  /auth:
    post:
      tags: [ app ]
      summary: Authenticate user and set auth cookie
      description: authenticate a user with username and password and set the
        authentication cookie via the Set-Cookie response header
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/credentials"
        required: true
      responses:
        200:
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/authenticationResponse"
        401:
          description: Unauthorized
      x-codegen-request-body-name: credentials
    delete:
      tags: [ app ]
      summary: Logout user
      description: invalidate the current cookie
      operationId: logout
      responses:
        204:
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
  /auth/refresh:
    get:
      tags: [ app ]
      summary: Refresh auth token
      description: refresh the current authentication token and set the new token via
        the Set-Cookie response header
      operationId: refreshToken
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/authenticationResponse"
          headers:
            Set-Cookie:
              schema:
                type: string
        401:
          description: Unauthorized
      security:
        - Cookie: []
  /backups:
    get:
      tags: [ app ]
      description: get list of backups
      operationId: getBackups
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "./models.yaml#/components/schemas/backup"
        500:
          description: Internal Server Error
      security:
        - Cookie: [ admin ]
    post:
      tags: [ app ]
      description: create a backup of the application
      operationId: createBackup
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file_content:
                  type: string
                  format: binary
      responses:
        201:
          description: Created
          headers:
            Location:
              schema:
                type: string
        400:
          description: Bad Request
        500:
          description: Internal Server Error
      security:
        - Cookie: [ admin ]
  /backups/{fileName}:
    parameters:
      - name: fileName
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [ app ]
      summary: Restore from backup
      description: restore from an existing backup
      operationId: restoreFromBackup
      responses:
        204:
          description: No Content
        400:
          description: Bad Request
      security:
        - Cookie: [ admin ]
    delete:
      tags: [ app ]
      summary: Delete backup
      description: delete an existing backup
      operationId: deleteBackup
      responses:
        204:
          description: No Content
        400:
          description: Bad Request
      security:
        - Cookie: [ admin ]
  /recipes:
    get:
      tags: [ recipes ]
      summary: Find recipes
      description: list the recipes
      operationId: find
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: pictures
          in: query
          schema:
            $ref: "#/components/schemas/yesNoAny"
        - name: fields[]
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "./models.yaml#/components/schemas/searchField"
        - name: states[]
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "./models.yaml#/components/schemas/recipeState"
        - name: tags[]
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: sort
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/sortBy"
        - name: dir
          in: query
          schema:
            $ref: "./models.yaml#/components/schemas/sortDir"
        - name: page
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
        - name: count
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
          required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/searchResult"
      security:
        - Cookie: [ viewer ]
    post:
      tags: [ recipes ]
      summary: Add recipe
      description: add a recipe
      operationId: addRecipe
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/recipe"
        required: true
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/recipe"
      security:
        - Cookie: [ editor ]
      x-codegen-request-body-name: recipe
  /recipes/{recipeId}:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [ recipes ]
      summary: Get recipe
      description: get a single recipe
      operationId: getRecipe
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/recipe"
      security:
        - Cookie: [ viewer ]
    put:
      tags: [ recipes ]
      summary: Save recipe
      description: modify an existing recipe
      operationId: saveRecipe
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/recipe"
        required: true
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ editor ]
      x-codegen-request-body-name: recipe
    patch:
      tags: [ recipes ]
      summary: Patch recipe
      description: partially modify an existing recipe
      operationId: patchRecipe
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/recipePatch"
        required: true
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ editor ]
      x-codegen-request-body-name: recipePatch
    delete:
      tags: [ recipes ]
      summary: Delete recipe
      description: delete an existing recipe
      operationId: deleteRecipe
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ editor ]
  /recipes/{recipeId}/images:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [ recipes ]
      summary: List recipe images
      description: get the images on a recipe
      operationId: getImages
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      security:
        - Cookie: [ viewer ]
    post:
      tags: [ recipes ]
      summary: Upload recipe image
      description: add an image to a recipe
      operationId: uploadImage
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file_content:
                  type: string
                  format: binary
      responses:
        201:
          description: Created
          headers:
            Location:
              schema:
                type: string
        400:
          description: Bad Request
      security:
        - Cookie: [ editor ]
  /recipes/{recipeId}/images/{name}:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: name
        in: path
        required: true
        schema:
          type: string
          # Disallow path separator characters and ..
          pattern: "^(?!.*[\\/]|\\.\\.).*$"
    patch:
      tags: [ recipes ]
      summary: Optimize recipe image
      description: optimize an existing image from a recipe
      operationId: optimizeImage
      responses:
        200:
          description: OK
          headers:
            Location:
              schema:
                type: string
        400:
          description: Bad Request
      security:
        - Cookie: [ admin ]
    delete:
      tags: [ recipes ]
      summary: Delete recipe image
      description: delete an existing image from a recipe
      operationId: deleteImage
      responses:
        204:
          description: No Content
        400:
          description: Bad Request
      security:
        - Cookie: [ editor ]
  /recipes/{recipeId}/links:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [ recipes ]
      summary: List recipe links
      description: get the links on a recipe
      operationId: getLinks
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "./models.yaml#/components/schemas/recipeCompact"
      security:
        - Cookie: [ viewer ]
  /recipes/{recipeId}/links/{destRecipeId}:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: destRecipeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    put:
      tags: [ recipes ]
      summary: Add recipe link
      description: add a link to a recipe
      operationId: addLink
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ editor ]
    delete:
      tags: [ recipes ]
      summary: Delete recipe link
      description: delete an existing link
      operationId: deleteLink
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ editor ]
  /recipes/{recipeId}/notes:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [ recipes ]
      summary: List recipe notes
      description: get the notes on a recipe
      operationId: getNotes
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "./models.yaml#/components/schemas/note"
      security:
        - Cookie: [ viewer ]
    post:
      tags: [ recipes ]
      summary: Add recipe note
      description: add a note to a recipe
      operationId: addNote
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/note"
        required: true
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/note"
      security:
        - Cookie: [ editor ]
      x-codegen-request-body-name: note
  /recipes/{recipeId}/notes/{noteId}:
    parameters:
      - name: recipeId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: noteId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    put:
      tags: [ recipes ]
      summary: Save recipe note
      description: modify a note
      operationId: saveNote
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/note"
        required: true
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ editor ]
      x-codegen-request-body-name: note
    delete:
      tags: [ recipes ]
      summary: Delete recipe note
      description: delete an existing note
      operationId: deleteNote
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ editor ]
  /tags:
    get:
      tags: [ recipes ]
      summary: List tags
      description: get list of tags
      operationId: getAllTags
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
      security:
        - Cookie: [ viewer ]
  /uploads:
    post:
      tags: [ app ]
      summary: Upload file
      description: Upload a file
      operationId: upload
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file_content:
                  type: string
                  format: binary
      responses:
        201:
          description: Created
          headers:
            Location:
              schema:
                type: string
        400:
          description: Bad Request
      security:
        - Cookie: [ viewer ]
  /users:
    get:
      tags: [ users ]
      summary: List users
      description: get list of users
      operationId: getAllUsers
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "./models.yaml#/components/schemas/user"
      security:
        - Cookie: [ admin ]
    post:
      tags: [ users ]
      summary: Add user
      description: add a user
      operationId: addUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/userWithPassword"
        required: true
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/user"
      security:
        - Cookie: [ admin ]
      x-codegen-request-body-name: user
  /users/current:
    get:
      tags: [ users ]
      summary: Get current user
      description: get the current user
      operationId: getCurrentUser
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/user"
        401:
          description: Unauthorized
      security:
        - Cookie: [ viewer ]
  /users/current/filters:
    get:
      tags: [ users ]
      summary: List current user search filters
      description: get a list of search filters
      operationId: getSearchFilters
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "./models.yaml#/components/schemas/savedSearchFilterCompact"
        401:
          description: Unauthorized
      security:
        - Cookie: [ viewer ]
    post:
      tags: [ users ]
      summary: Add current user search filter
      description: add a search filter
      operationId: addSearchFilter
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/savedSearchFilter"
        required: true
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/savedSearchFilter"
        401:
          description: Unauthorized
      security:
        - Cookie: [ viewer ]
      x-codegen-request-body-name: searchFilter
  /users/current/filters/{filterId}:
    parameters:
      - name: filterId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [ users ]
      summary: Get current user search filter
      description: get a search filter
      operationId: getSearchFilter
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/savedSearchFilter"
        401:
          description: Unauthorized
      security:
        - Cookie: [ viewer ]
    put:
      tags: [ users ]
      summary: Save current user search filter
      description: modify the search filter
      operationId: saveSearchFilter
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/savedSearchFilter"
        required: true
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
      security:
        - Cookie: [ viewer ]
      x-codegen-request-body-name: searchFilter
    delete:
      tags: [ users ]
      summary: Delete current user search filter
      description: delete a search filter
      operationId: deleteSearchFilter
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
      security:
        - Cookie: [ viewer ]
  /users/current/password:
    put:
      tags: [ users ]
      summary: Change current user password
      description: update the current user's password
      operationId: changePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/userPasswordRequest"
        required: true
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
        403:
          description: Forbidden
      security:
        - Cookie: [ viewer ]
      x-codegen-request-body-name: userPasswordRequest
  /users/current/settings:
    get:
      tags: [ users ]
      summary: Get current user settings
      description: get the settings of the current user
      operationId: getSettings
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/userSettings"
        401:
          description: Unauthorized
      security:
        - Cookie: [ viewer ]
    put:
      tags: [ users ]
      summary: Save current user settings
      description: modify the settings of the current user
      operationId: saveSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/userSettings"
        required: true
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
      security:
        - Cookie: [ viewer ]
      x-codegen-request-body-name: settings
  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [ users ]
      summary: Get user
      description: get a user
      operationId: getUser
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/user"
      security:
        - Cookie: [ admin ]
    put:
      tags: [ users ]
      summary: Save user
      description: modify a user
      operationId: saveUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/user"
        required: true
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
        403:
          description: Forbidden
      security:
        - Cookie: [ admin ]
      x-codegen-request-body-name: user
    delete:
      tags: [ users ]
      summary: Delete user
      description: delete an existing user
      operationId: deleteUser
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
        403:
          description: Forbidden
      security:
        - Cookie: [ admin ]
  /users/{userId}/filters:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [ users ]
      summary: List user search filters
      description: get a list of search filters
      operationId: getUserSearchFilters
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "./models.yaml#/components/schemas/savedSearchFilterCompact"
      security:
        - Cookie: [ admin ]
    post:
      tags: [ users ]
      summary: Add user search filter
      description: add a search filter
      operationId: addUserSearchFilter
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/savedSearchFilter"
        required: true
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/savedSearchFilter"
      security:
        - Cookie: [ admin ]
      x-codegen-request-body-name: searchFilter
  /users/{userId}/filters/{filterId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: filterId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [ users ]
      summary: Get user search filter
      description: get a search filter
      operationId: getUserSearchFilter
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/savedSearchFilter"
      security:
        - Cookie: [ admin ]
    put:
      tags: [ users ]
      summary: Save user search filter
      description: modify the search filter
      operationId: saveUserSearchFilter
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/savedSearchFilter"
        required: true
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ admin ]
      x-codegen-request-body-name: searchFilter
    delete:
      tags: [ users ]
      summary: Delete user search filter
      description: delete a search filter
      operationId: deleteUserSearchFilter
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ admin ]
  /users/{userId}/password:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    put:
      tags: [ users ]
      summary: Change user password
      description: update a user's password
      operationId: changeUserPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/userPasswordRequest"
        required: true
      responses:
        204:
          description: No Content
        401:
          description: Unauthorized
        403:
          description: Forbidden
      security:
        - Cookie: [ admin ]
      x-codegen-request-body-name: userPasswordRequest
  /users/{userId}/settings:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [ users ]
      summary: Get user settings
      description: get the settings of a user
      operationId: getUserSettings
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: "./models.yaml#/components/schemas/userSettings"
      security:
        - Cookie: [ admin ]
    put:
      tags: [ users ]
      summary: Save user settings
      description: modify the settings of a user
      operationId: saveUserSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "./models.yaml#/components/schemas/userSettings"
        required: true
      responses:
        204:
          description: No Content
      security:
        - Cookie: [ admin ]
      x-codegen-request-body-name: settings
components:
  schemas:
    authenticationResponse:
      description: Authentication payload containing the authenticated user.
      example:
        user:
          id: 1
          username: admin
          accessLevel: admin
          createdAt: "2026-04-21T12:00:00Z"
          modifiedAt: "2026-04-21T12:00:00Z"
      type: object
      required:
        - user
      properties:
        user:
          $ref: "./models.yaml#/components/schemas/user"
    credentials:
      description: Username and password used to authenticate a user.
      example:
        username: demo
        password: secret-password
      required:
        - password
        - username
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    searchResult:
      type: object
      required:
        - total
      properties:
        total:
          type: integer
          format: int64
          minimum: 0
        recipes:
          type: array
          items:
            $ref: "./models.yaml#/components/schemas/recipeCompact"
    userPasswordRequest:
      description: Password change request containing current and new password values.
      example:
        currentPassword: old-password
        newPassword: new-password
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
    userWithPassword:
      allOf:
        - $ref: "./models.yaml#/components/schemas/user"
